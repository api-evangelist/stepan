principles:
  - name: Visibility
    description: Visibility is whatever order / SDS / product-data reporting Stepan provides through
      the customer relationship — there is no public API usage feed.
  - name: Allocation
    description: Allocate Stepan-related data and integration cost in your own ERP / procurement system
      against the underlying chemical-supply contract.
  - name: Optimization
    description: Optimization happens via supplier / contract negotiation, not via API plan changes.
  - name: Accountability
    description: A procurement / supply-chain owner should hold the Stepan engagement cost line and
      renewal cycle.
